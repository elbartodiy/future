<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта перехода — данные по миру и годам</title>
<style>
:root{
  --bg:#0a0e12;--ink:#e8eef4;--dim:#8a9bad;--faint:#48586a;--line:#22303d;--panel:#0d141b;
  --sea:#0b131b;--land-empty:#141d27;--stroke:#1f2d3a;
  --lowc:#8a3a3a;--highc:#36c5c0;
  --fact:#4cae6b;--forecast:#e0a93b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
header{flex:0 0 auto;padding:12px 18px 10px;display:flex;align-items:center;gap:14px;z-index:30;
  border-bottom:1px solid var(--line)}
.brand b{font-size:15px;font-weight:650;display:block;line-height:1.1;letter-spacing:-.01em}
.brand span{font-size:9.5px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase}
.metricsel{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.metricsel button{background:var(--panel);border:1px solid var(--line);color:var(--dim);
  font-size:12px;font-weight:500;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s}
.metricsel button.on{background:#1c2c3a;color:var(--ink);border-color:#33475a}
.metricsel button.soon{opacity:.35;cursor:default}
.metricsel button:not(.soon):hover{border-color:#33475a;color:var(--ink)}

#stage{flex:1 1 auto;position:relative;overflow:hidden}
svg{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
svg:active{cursor:grabbing}
.sea{fill:var(--sea)}
.grat{stroke:#12202c;stroke-width:.5;fill:none;opacity:.6}
.country{stroke:var(--stroke);stroke-width:.4;fill:var(--land-empty);transition:fill .3s;cursor:pointer}
.country.empty{fill:var(--land-empty)}
.country:hover{stroke:#7d9ab0;stroke-width:.9}
.country.sel{stroke:#e8eef4;stroke-width:1.3}

.legend{position:absolute;left:16px;bottom:16px;z-index:15;background:rgba(10,14,18,.85);
  border:1px solid var(--line);border-radius:12px;padding:13px 15px;max-width:230px;backdrop-filter:blur(8px)}
.legend h4{margin:0 0 3px;font-size:12.5px;font-weight:600}
.legend .sub{font-size:10px;color:var(--faint);line-height:1.4;margin-bottom:10px}
.legend .bar{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--lowc),#6b7a5a,var(--highc));margin-bottom:5px}
.legend .ends{display:flex;justify-content:space-between;font-size:9.5px;color:var(--dim)}
.legend .cert{display:flex;gap:12px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line);font-size:9.5px;color:var(--dim)}
.legend .cert span{display:flex;align-items:center;gap:5px}
.legend .cert i{width:9px;height:9px;border-radius:50%;display:inline-block}

.zoomctl{position:absolute;right:16px;bottom:130px;display:flex;flex-direction:column;gap:7px;z-index:15}
.zoomctl button{width:40px;height:40px;border-radius:11px;background:rgba(13,20,27,.9);
  border:1px solid var(--line);color:var(--ink);font-size:20px;cursor:pointer;backdrop-filter:blur(6px)}
.zoomctl button:active{background:#1c2c3a}

.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--dim);z-index:40;background:var(--bg)}
.loading.hide{display:none}

/* timeline */
.timewrap{flex:0 0 auto;margin:0;padding:12px 22px 15px;border-top:1px solid var(--line);
  background:linear-gradient(180deg,transparent,rgba(10,14,18,.4));z-index:20}
.eras{display:flex;justify-content:space-between;font-size:9px;color:var(--faint);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;max-width:900px;margin-left:auto;margin-right:auto}
.eras b{color:var(--dim);font-weight:600}
.trackrow{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:16px}
.slider-wrap{flex:1;position:relative}
input[type=range]{width:100%;-webkit-appearance:none;background:transparent;height:26px;margin:0;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;
  background:linear-gradient(90deg,#243240,#3a4d5e,#243240)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  margin-top:-8px;background:var(--ink);border:3px solid var(--bg);box-shadow:0 0 0 1px #3a4d5e}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ink);border:3px solid var(--bg)}
.anchor-ticks{position:absolute;top:20px;left:0;right:0;height:6px;pointer-events:none}
.anchor-ticks i{position:absolute;width:2px;height:6px;background:var(--fact);opacity:.7;border-radius:1px}
.ybox{min-width:130px;text-align:left}
.ybox .y{font-size:26px;font-weight:650;font-variant-numeric:tabular-nums;line-height:1}
.ybox .ph{font-size:10.5px;color:var(--dim);margin-top:2px}
.play{width:42px;height:42px;border-radius:12px;background:#16212c;border:1px solid var(--line);
  color:var(--dim);font-size:16px;cursor:pointer}
.play:hover{color:var(--ink)}

/* detail panel */
.panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;z-index:50;background:var(--panel);
  border-left:1px solid var(--line);transform:translateX(102%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  padding:24px 26px;overflow-y:auto}
.panel.open{transform:none}
.panel .close{position:absolute;top:16px;right:18px;width:32px;height:32px;border-radius:9px;
  background:#16212c;border:1px solid var(--line);color:var(--dim);cursor:pointer;font-size:16px}
.panel .cname{font-size:22px;font-weight:650;margin:6px 0 2px;letter-spacing:-.01em}
.panel .ciso{font-size:11px;color:var(--faint);letter-spacing:.1em;margin-bottom:20px}
.panel .valbig{font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
.panel .valcap{font-size:11px;color:var(--dim);margin:5px 0 2px}
.panel .valyear{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
.panel .certtag{display:inline-block;font-size:10.5px;padding:5px 10px;border-radius:7px;margin-top:14px}
.certtag.fact{background:rgba(76,174,107,.13);color:#7fd3a0;border:1px solid rgba(76,174,107,.3)}
.certtag.forecast{background:rgba(224,169,59,.13);color:#e6c074;border:1px solid rgba(224,169,59,.3)}
.spark{margin:22px 0 6px;width:100%;height:64px}
.sparklbl{font-size:10px;color:var(--faint);display:flex;justify-content:space-between}
.panel .note{font-size:13.5px;line-height:1.6;color:#cdd8e2;margin-top:20px}
.panel .src{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint)}
.panel .src a{color:var(--dim)}
.method{position:absolute;left:16px;top:14px;z-index:15;max-width:min(340px,60%)}
.method button{background:rgba(13,20,27,.85);border:1px solid var(--line);color:var(--dim);
  font-size:11px;padding:6px 11px;border-radius:8px;cursor:pointer;backdrop-filter:blur(6px)}
.method .body{display:none;margin-top:8px;background:rgba(13,20,27,.95);border:1px solid var(--line);
  border-radius:10px;padding:13px 15px;font-size:11.5px;line-height:1.55;color:#c2cdd8;backdrop-filter:blur(8px)}
.method.open .body{display:block}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;opacity:0;pointer-events:none;transition:.25s}
.scrim.on{opacity:1;pointer-events:auto}
</style>
</head>
<body>
<header>
  <div class="brand"><b>Карта перехода</b><span>данные · мир · годы</span></div>
  <div class="metricsel" id="metricsel"></div>
</header>

<div id="stage">
  <svg id="svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
    <rect class="sea" x="0" y="0" width="1000" height="500"/>
    <g id="cam">
      <g id="grat"></g>
      <g id="countries"></g>
    </g>
  </svg>
  <div class="method" id="method">
    <button id="methodbtn">Методология ▾</button>
    <div class="body" id="methodbody"></div>
  </div>
  <div class="legend" id="legend">
    <h4 id="lg-title">—</h4>
    <div class="sub" id="lg-sub"></div>
    <div class="bar"></div>
    <div class="ends"><span id="lg-low">0</span><span id="lg-high">100</span></div>
    <div class="cert">
      <span><i style="background:var(--fact)"></i>факт (год-якорь)</span>
      <span><i style="background:var(--forecast)"></i>интерполяция</span>
    </div>
  </div>
  <div class="zoomctl">
    <button id="zin">+</button><button id="zout">−</button><button id="zreset" style="font-size:14px">⊙</button>
  </div>
  <div class="loading" id="loading">Загрузка карты мира и данных…</div>
</div>

<div class="timewrap">
  <div class="eras"><b>1995</b><span>2005</span><span>2015</span><b>2026</b><span>2036</span><b>2046</b></div>
  <div class="trackrow">
    <div class="ybox"><div class="y" id="ylbl">2026</div><div class="ph" id="phlbl">настоящее</div></div>
    <div class="slider-wrap">
      <input type="range" id="time" min="1995" max="2046" value="2026" step="1">
      <div class="anchor-ticks" id="anchorticks"></div>
    </div>
    <button class="play" id="play">▶</button>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="panel" id="panel">
  <button class="close" id="pclose">×</button>
  <div class="cname" id="p-name">—</div>
  <div class="ciso" id="p-iso"></div>
  <div class="valbig" id="p-val">—</div>
  <div class="valcap" id="p-valcap"></div>
  <div class="valyear" id="p-valyear"></div>
  <div class="certtag" id="p-cert"></div>
  <svg class="spark" id="p-spark" viewBox="0 0 300 64" preserveAspectRatio="none"></svg>
  <div class="sparklbl"><span id="p-sy0">1995</span><span>траектория</span><span id="p-sy1">2046</span></div>
  <div class="note" id="p-note"></div>
  <div class="src" id="p-src"></div>
</div>

<script>
const DATA_BASE = './'; // same folder as index.html on GitHub Pages
let BORDERS=null, METRIC=null, curMetric='ai_dependence', year=2026;
const METRICS=[
  {id:'ai_dependence', name:'Зависимость от AI', ready:true},
  {id:'influence', name:'Влияние', ready:false},
  {id:'energy', name:'Энергия и ресурсы', ready:false},
  {id:'pyramid', name:'Слои общества', ready:false},
];

const NS="http://www.w3.org/2000/svg";
const svg=document.getElementById('svg'), gGrat=document.getElementById('grat'), gC=document.getElementById('countries');
function proj(lng,lat){return [(lng+180)/360*1000,(90-lat)/180*500]}
function lerpColor(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t))}
const LOW=[138,58,58], HIGH=[54,197,192];

async function loadJSON(f){const r=await fetch(DATA_BASE+f);if(!r.ok)throw new Error('load '+f);return r.json()}

function drawGraticule(){
  for(let lng=-180;lng<=180;lng+=30){const[a,b]=proj(lng,-84),[c,d]=proj(lng,84);
    const l=document.createElementNS(NS,'line');l.setAttribute('x1',a);l.setAttribute('y1',b);l.setAttribute('x2',c);l.setAttribute('y2',d);l.setAttribute('class','grat');gGrat.appendChild(l)}
  for(let lat=-60;lat<=60;lat+=30){const[a,b]=proj(-180,lat),[c,d]=proj(180,lat);
    const l=document.createElementNS(NS,'line');l.setAttribute('x1',a);l.setAttribute('y1',b);l.setAttribute('x2',c);l.setAttribute('y2',d);l.setAttribute('class','grat');gGrat.appendChild(l)}
}

const countryEls={};
function drawCountries(){
  for(const iso in BORDERS.countries){
    const c=BORDERS.countries[iso];
    let d='';
    for(const ring of c.p){
      d+='M'+ring.map(pt=>proj(pt[0],pt[1]).join(',')).join('L')+'Z';
    }
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',d);path.setAttribute('class','country empty');path.dataset.iso=iso;
    path.addEventListener('click',e=>{e.stopPropagation();openPanel(iso)});
    gC.appendChild(path);countryEls[iso]=path;
  }
}

function yearIdx(y){return (METRIC.years||[]).indexOf(y)}
function valueFor(iso,y){
  const s=METRIC.series[iso];if(!s)return null;
  const i=yearIdx(y);if(i<0)return null;
  return s.v[i];
}
function isAnchor(iso,y){const s=METRIC.series[iso];return s&&s.anchors&&s.anchors.includes(y)}

function paint(){
  const y=year;
  document.getElementById('ylbl').textContent=y;
  document.getElementById('phlbl').textContent=phase(y);
  for(const iso in countryEls){
    const v=valueFor(iso,y);
    const el=countryEls[iso];
    if(v==null){el.setAttribute('fill','var(--land-empty)');el.classList.add('empty');continue}
    el.classList.remove('empty');
    const t=Math.max(0,Math.min(1,v/100));
    const col=lerpColor(LOW,HIGH,t);
    el.setAttribute('fill',`rgb(${col[0]},${col[1]},${col[2]})`);
  }
  // refresh open panel if any
  if(selISO) fillPanel(selISO);
}
function phase(y){if(y<2000)return'90-е · до массового AI';if(y<2010)return'2000-е';if(y<2023)return'2010-е · подъём';if(y<2027)return'настоящее';if(y<2037)return'ближний прогноз';return'дальний горизонт'}

/* metric switching */
async function setMetric(id){
  curMetric=id;
  document.querySelectorAll('#metricsel button').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
  const def=METRICS.find(m=>m.id===id);
  if(!def.ready){return}
  METRIC=await loadJSON(id+'.json');
  document.getElementById('lg-title').textContent=METRIC.name;
  document.getElementById('lg-sub').textContent='';
  document.getElementById('lg-low').textContent=METRIC.low;
  document.getElementById('lg-high').textContent=METRIC.high;
  document.getElementById('methodbody').textContent=METRIC.methodology;
  // anchor ticks: union of all anchor years -> ticks on slider
  const allA=new Set();
  for(const iso in METRIC.series)(METRIC.series[iso].anchors||[]).forEach(a=>allA.add(a));
  const at=document.getElementById('anchorticks');at.innerHTML='';
  const y0=METRIC.y0,y1=METRIC.y1;
  [...allA].forEach(a=>{const i=document.createElement('i');i.style.left=((a-y0)/(y1-y0)*100)+'%';at.appendChild(i)});
  // clamp year to metric range
  const t=document.getElementById('time');t.min=y0;t.max=y1;if(year<y0)year=y0;if(year>y1)year=y1;t.value=year;
  paint();
}

/* panel */
let selISO=null;
const panel=document.getElementById('panel'),scrim=document.getElementById('scrim');
function openPanel(iso){selISO=iso;
  Object.values(countryEls).forEach(e=>e.classList.remove('sel'));
  if(countryEls[iso])countryEls[iso].classList.add('sel');
  fillPanel(iso);panel.classList.add('open');scrim.classList.add('on')}
function fillPanel(iso){
  const s=METRIC.series[iso];
  const bc=BORDERS.countries[iso];
  document.getElementById('p-name').textContent=(s&&s.n)||(bc&&bc.n)||iso;
  document.getElementById('p-iso').textContent=iso+(s?'':' · нет данных по этому показателю');
  if(!s){
    document.getElementById('p-val').textContent='—';
    document.getElementById('p-valcap').textContent='данные не собраны';
    document.getElementById('p-valyear').textContent='';
    document.getElementById('p-cert').textContent='';document.getElementById('p-cert').className='certtag';
    document.getElementById('p-note').textContent='Эта страна пока не заполнена по текущему показателю. В полной системе агент дополнит её из источников.';
    document.getElementById('p-src').innerHTML='';
    document.getElementById('p-spark').innerHTML='';
    return;
  }
  const v=valueFor(iso,year);
  document.getElementById('p-val').textContent=v;
  document.getElementById('p-valcap').textContent=METRIC.low+' ← → '+METRIC.high;
  document.getElementById('p-valyear').textContent='год: '+year;
  const anc=isAnchor(iso,year);
  const ct=document.getElementById('p-cert');
  ct.textContent=anc?'факт · год с твёрдыми данными':'интерполяция / прогноз';
  ct.className='certtag '+(anc?'fact':'forecast');
  document.getElementById('p-note').textContent=s.note||'';
  const src=document.getElementById('p-src');
  src.innerHTML=s.src&&s.src.name?('источник: '+(s.src.url?`<a href="${s.src.url}" target="_blank" rel="noopener">${s.src.name}</a>`:s.src.name)):'';
  // sparkline
  drawSpark(s);
  document.getElementById('p-sy0').textContent=METRIC.y0;
  document.getElementById('p-sy1').textContent=METRIC.y1;
}
function drawSpark(s){
  const sp=document.getElementById('p-spark');sp.innerHTML='';
  const ys=METRIC.years,vs=s.v;const W=300,H=64,pad=4;
  const x=i=>pad+i/(vs.length-1)*(W-2*pad);
  const yv=v=>H-pad-(v/100)*(H-2*pad);
  // area
  let d='M'+x(0)+','+yv(vs[0]);
  for(let i=1;i<vs.length;i++)d+='L'+x(i)+','+yv(vs[i]);
  const path=document.createElementNS(NS,'path');path.setAttribute('d',d);
  path.setAttribute('fill','none');path.setAttribute('stroke','#36c5c0');path.setAttribute('stroke-width','2');
  sp.appendChild(path);
  // current-year marker
  const ci=ys.indexOf(year);
  if(ci>=0){const cx=x(ci),cy=yv(vs[ci]);
    const ln=document.createElementNS(NS,'line');ln.setAttribute('x1',cx);ln.setAttribute('y1',pad);ln.setAttribute('x2',cx);ln.setAttribute('y2',H-pad);
    ln.setAttribute('stroke','#e8eef4');ln.setAttribute('stroke-width','1');ln.setAttribute('opacity','.35');sp.appendChild(ln);
    const dot=document.createElementNS(NS,'circle');dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);dot.setAttribute('r',3.5);dot.setAttribute('fill','#e8eef4');sp.appendChild(dot)}
  // anchor dots
  (s.anchors||[]).forEach(a=>{const i=ys.indexOf(a);if(i>=0){const dot=document.createElementNS(NS,'circle');
    dot.setAttribute('cx',x(i));dot.setAttribute('cy',yv(vs[i]));dot.setAttribute('r',2.6);dot.setAttribute('fill','#4cae6b');sp.appendChild(dot)}});
}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('on');selISO=null;
  Object.values(countryEls).forEach(e=>e.classList.remove('sel'))}
document.getElementById('pclose').onclick=closePanel;scrim.onclick=closePanel;

/* time slider */
const timeEl=document.getElementById('time');
timeEl.addEventListener('input',()=>{year=+timeEl.value;paint()});
let playing=false;const play=document.getElementById('play');
play.onclick=()=>{playing=!playing;play.textContent=playing?'⏸':'▶';if(playing)step()};
function step(){if(!playing)return;year=year>=METRIC.y1?METRIC.y0:year+1;timeEl.value=year;paint();
  setTimeout(()=>requestAnimationFrame(step),160)}

/* camera pan/zoom */
const cam=document.getElementById('cam');let scale=1,tx=0,ty=0;
function applyCam(){cam.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`)}
function clampCam(){const mx=1000*(scale-1),my=500*(scale-1);tx=Math.min(0,Math.max(-mx,tx));ty=Math.min(0,Math.max(-my,ty))}
function zoomAt(cx,cy,f){const ns=Math.min(8,Math.max(1,scale*f));const k=ns/scale;tx=cx-(cx-tx)*k;ty=cy-(cy-ty)*k;scale=ns;clampCam();applyCam()}
function svgPt(cx,cy){const r=svg.getBoundingClientRect();return[(cx-r.left)/r.width*1000,(cy-r.top)/r.height*500]}
document.getElementById('zin').onclick=()=>zoomAt(500,250,1.5);
document.getElementById('zout').onclick=()=>zoomAt(500,250,1/1.5);
document.getElementById('zreset').onclick=()=>{scale=1;tx=0;ty=0;applyCam()};
svg.addEventListener('wheel',e=>{e.preventDefault();const[cx,cy]=svgPt(e.clientX,e.clientY);zoomAt(cx,cy,e.deltaY<0?1.12:1/1.12)},{passive:false});
let md=false,mp=null,moved=false;
svg.addEventListener('mousedown',e=>{md=true;moved=false;mp={x:e.clientX,y:e.clientY}});
window.addEventListener('mousemove',e=>{if(!md)return;const r=svg.getBoundingClientRect();
  const dx=(e.clientX-mp.x),dy=(e.clientY-mp.y);if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
  tx+=dx/r.width*1000;ty+=dy/r.height*500;mp={x:e.clientX,y:e.clientY};clampCam();applyCam()});
window.addEventListener('mouseup',()=>md=false);
// touch
let pts=new Map(),lastD=0;
svg.addEventListener('touchstart',e=>{for(const t of e.changedTouches)pts.set(t.identifier,{x:t.clientX,y:t.clientY});
  if(pts.size===2){const a=[...pts.values()];lastD=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)}},{passive:false});
svg.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(pts.has(t.identifier))pts.set(t.identifier,{x:t.clientX,y:t.clientY})}
  const a=[...pts.values()];
  if(pts.size===2){const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);const mid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};const[cx,cy]=svgPt(mid.x,mid.y);if(lastD)zoomAt(cx,cy,d/lastD);lastD=d}
  else if(pts.size===1){const r=svg.getBoundingClientRect();const t=a[0];if(svg._lp){tx+=(t.x-svg._lp.x)/r.width*1000;ty+=(t.y-svg._lp.y)/r.height*500;clampCam();applyCam()}svg._lp={x:t.x,y:t.y}}},{passive:false});
svg.addEventListener('touchend',e=>{for(const t of e.changedTouches)pts.delete(t.identifier);if(pts.size<2)lastD=0;if(pts.size===0)svg._lp=null},{passive:false});

/* method toggle */
const method=document.getElementById('method');
document.getElementById('methodbtn').onclick=()=>method.classList.toggle('open');

/* metric buttons */
const ms=document.getElementById('metricsel');
METRICS.forEach(m=>{const b=document.createElement('button');b.dataset.id=m.id;b.textContent=m.name+(m.ready?'':' · скоро');
  if(!m.ready)b.classList.add('soon');if(m.id===curMetric)b.classList.add('on');
  b.onclick=()=>{if(m.ready)setMetric(m.id)};ms.appendChild(b)});

/* init */
(async function(){
  try{
    BORDERS=await loadJSON('borders.json');
    drawGraticule();drawCountries();
    await setMetric('ai_dependence');
    document.getElementById('loading').classList.add('hide');
    // default zoom slightly out to show whole world
  }catch(e){
    document.getElementById('loading').textContent='Не удалось загрузить данные: '+e.message+'. Проверь, что borders.json и ai_dependence.json лежат рядом с index.html.';
  }
})();
</script>
</body>
</html>
