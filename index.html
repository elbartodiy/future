<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Карта перехода</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#0a0e12;--ink:#e8eef4;--dim:#8a9bad;--faint:#48586a;--line:#22303d;--panel:#0d141b;
  --resources:#e0a93b;--ecology:#4cae6b;--consumption:#d8643f;
  --control:#5b7fd1;--migration:#b86fc4;--ai:#36c5c0;--robots:#e35d7b;--hub:#f4f1ea;
  --civ-us:#3d8bff;--civ-cn:#e5484d;--civ-ru:#8a7fd4;--civ-eu:#f0b429;
  --arc-base:#36c5c0;
}
body.light{
  --bg:#eef1f4;--ink:#141c24;--dim:#4c5b6a;--faint:#8595a6;--line:#d3dbe2;--panel:#ffffff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
header{flex:0 0 auto;padding:11px 14px 8px;display:flex;align-items:center;gap:10px;z-index:30}
.brand b{font-size:14px;font-weight:600;display:block;line-height:1.1}
.brand span{font-size:9.5px;color:var(--dim);letter-spacing:.13em;text-transform:uppercase}
.twbtn{margin-left:auto;width:34px;height:34px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--dim);font-size:15px;cursor:pointer}
.twbtn.on{color:var(--ink);border-color:#3a4d5e}
#appwrap{flex:1 1 auto;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#appwrap.bp-tablet #stage{max-width:768px}
#appwrap.bp-mobile #stage{max-width:390px}
#stage{position:relative;width:100%;height:100%;margin:auto;overflow:hidden;transition:max-width .25s}
.view{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .25s}
.view.on{opacity:1;pointer-events:auto}
#glcanvas{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
#glcanvas:active{cursor:grabbing}
.land{fill:#101b25;stroke:#1d2c3a;stroke-width:.5}
.nlabel{font-size:9px;fill:var(--ink);paint-order:stroke;stroke:#0a0e12;stroke-width:3px;pointer-events:none;opacity:0;font-weight:500;transition:opacity .2s}
.zoomctl{position:absolute;right:12px;bottom:118px;display:flex;flex-direction:column;gap:6px;z-index:15}
.zoomctl button{width:38px;height:38px;border-radius:10px;background:rgba(16,24,32,.9);border:1px solid var(--line);color:var(--ink);font-size:19px;cursor:pointer;backdrop-filter:blur(6px)}
.zoomctl button:active{background:#243748}
.legend{position:absolute;left:10px;top:56px;z-index:15;display:flex;flex-direction:column;gap:5px;max-width:78%}
.legend .lg-row{display:flex;flex-wrap:wrap;gap:5px}
.lg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim);background:rgba(14,20,26,.82);border:1px solid var(--line);border-radius:16px;padding:4px 8px;backdrop-filter:blur(6px);cursor:pointer}
body.light .lg{background:rgba(255,255,255,.85)}
.lg.off{opacity:.3}.lg .dot{width:8px;height:8px;border-radius:50%}
.civcap{position:absolute;left:10px;top:52px;z-index:15;display:flex;flex-wrap:wrap;gap:5px;max-width:70%}
.civchip{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim);background:rgba(14,20,26,.82);border:1px solid var(--line);border-radius:16px;padding:4px 9px;backdrop-filter:blur(6px)}
.civchip .dot{width:9px;height:9px;border-radius:2px}
.rightpanel{position:absolute;right:12px;top:10px;z-index:15;display:flex;flex-direction:column;align-items:flex-end;gap:8px;max-width:82%}
.infnote{font-size:10px;color:var(--faint);max-width:170px;text-align:right;line-height:1.4;background:rgba(10,14,18,.7);padding:6px 8px;border-radius:8px}
.idxsel{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:5px}
.idxsel button{font-size:10.5px;color:var(--dim);background:rgba(14,20,26,.82);border:1px solid var(--line);border-radius:16px;padding:5px 10px;backdrop-filter:blur(6px);cursor:pointer}
.idxsel button.on{background:#243748;color:var(--ink);border-color:#3a4d5e}
.idxsel button.soon{opacity:.4;cursor:default}
.idxlegend{background:rgba(10,14,18,.82);border:1px solid var(--line);border-radius:10px;padding:9px 11px;max-width:200px;backdrop-filter:blur(6px)}
.idxbar{height:8px;border-radius:4px;background:linear-gradient(90deg,#1f3a42,#4dd8d0)}
.idxswatches{display:flex;flex-direction:column;gap:6px}
.idxswatches .sw-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink)}
.idxswatches .sw-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.idxlabels{display:flex;justify-content:space-between;font-size:9px;color:var(--faint);margin-top:4px}
.idxmeta{font-size:9.5px;color:var(--faint);line-height:1.4;margin-top:7px}
.pyrdrawer{position:absolute;left:0;right:0;bottom:0;max-height:46%;background:rgba(10,14,20,.97);border-top:1px solid var(--line);border-radius:16px 16px 0 0;z-index:25;overflow-y:auto;padding:14px 14px 24px;transform:translateY(100%);transition:transform .3s ease;pointer-events:none}
.pyrdrawer.open{transform:translateY(0);pointer-events:auto}
.pyr h3{font-size:13px;color:var(--dim);font-weight:500;margin:4px 4px 14px;letter-spacing:.02em}
.tier{position:relative;margin:0 auto;border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:.18s;background:var(--panel);overflow:hidden}
.tier:active{transform:scale(.99)}
.tier .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.tier .tname{font-size:14px;font-weight:600;margin-bottom:3px}
.tier .tlife{font-size:11.5px;color:var(--dim);line-height:1.45}
.tier .tpct{position:absolute;right:13px;top:12px;font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums}
.timewrap{flex:0 0 auto;margin:0 10px 10px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px 12px;z-index:20}
.eras{display:flex;justify-content:space-between;font-size:8.5px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.eras b{color:var(--dim);font-weight:600}
input[type=range]{width:100%;-webkit-appearance:none;background:transparent;height:24px;margin:0}
input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:linear-gradient(90deg,#2a3a48,#41566a,#2a3a48)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;margin-top:-8.5px;background:var(--ink);border:3px solid var(--bg);box-shadow:0 0 0 1px #3a4d5e}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ink);border:3px solid var(--bg)}
.trow{display:flex;align-items:center;gap:12px;margin-top:5px}
.trow .y{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;min-width:96px}
.trow .ph{font-size:10.5px;color:var(--dim);flex:1;line-height:1.3}
.trow .play{width:36px;height:34px;border-radius:9px;background:#16212c;border:1px solid var(--line);color:var(--dim);font-size:14px;cursor:pointer}
.certrow{display:flex;gap:4px;margin-top:9px;background:#121b24;border:1px solid var(--line);border-radius:9px;padding:3px}
body.light .certrow{background:#eef2f5}
.certrow button{flex:1;background:transparent;border:0;color:var(--faint);font-size:10.5px;padding:6px;border-radius:7px;cursor:pointer}
.certrow button.on{background:#243748;color:var(--ink)}
body.light .certrow button.on{background:#dbe4ec}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;transform:translateY(102%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:82vh;overflow-y:auto;padding:8px 20px 30px;box-shadow:0 -20px 40px rgba(0,0,0,.5)}
.sheet.open{transform:none}
.grip{width:38px;height:4px;border-radius:3px;background:#2c3a48;margin:6px auto 14px}
.sheet .eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.sheet h2{font-size:19px;line-height:1.25;margin:0 0 5px;font-weight:600}
.sheet .when{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;margin-bottom:14px}
.sheet .cert{font-size:10.5px;padding:6px 10px;border-radius:8px;display:inline-block;margin-bottom:14px}
.cert.fact{background:rgba(76,174,107,.12);color:#7fd3a0;border:1px solid rgba(76,174,107,.3)}
.cert.forecast{background:rgba(224,169,59,.12);color:#e6c074;border:1px solid rgba(224,169,59,.3)}
.cert.fantasy{background:rgba(184,111,196,.12);color:#cf95d8;border:1px solid rgba(184,111,196,.3)}
.sheet .body{font-size:14px;line-height:1.6;color:var(--ink)}
.sheet .geo{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);margin-top:14px;padding:4px 9px;border:1px solid var(--line);border-radius:16px}
.sheet .rel{margin-top:18px}
.sheet .rel h4{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 8px}
.sheet .rel a{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);text-decoration:none;padding:9px;border-radius:9px;background:#111a23;margin-bottom:6px}
body.light .sheet .rel a{background:#eef2f5}
.sheet .rel .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sheet .rel .verb{color:var(--faint);font-size:10.5px;margin-left:auto}
.sheet .src{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--faint)}
.sheet .src a{color:var(--dim)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:.25s}
.scrim.on{opacity:1;pointer-events:auto}
/* Tweaks panel */
.tweaks{position:absolute;right:0;top:0;bottom:0;width:280px;max-width:82vw;background:var(--panel);border-left:1px solid var(--line);z-index:40;padding:16px;overflow-y:auto;transform:translateX(100%);transition:transform .25s;font-size:12px}
.tweaks.open{transform:none}
.tweaks h4{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:16px 0 8px}
.tweaks h4:first-child{margin-top:0}
.seg{display:flex;background:#121b24;border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
body.light .seg{background:#eef2f5}
.seg button{flex:1;background:transparent;border:0;color:var(--faint);font-size:10.5px;padding:7px 4px;border-radius:7px;cursor:pointer;font-weight:600;letter-spacing:.03em}
.seg button.on{background:#243748;color:var(--ink)}
body.light .seg button.on{background:#dbe4ec}
.twrow{margin-bottom:12px}
.twrow .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink);margin-bottom:4px}
.twrow .lbl span:last-child{color:var(--dim);font-variant-numeric:tabular-nums}
.colorpick{display:flex;align-items:center;gap:9px;background:#121b24;border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
body.light .colorpick{background:#eef2f5}
.swatch{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.chk{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer;font-size:12px}
.chk input{width:16px;height:16px;accent-color:#41566a}
</style>
</head>
<body>
<header>
  <div class="brand"><b>Карта перехода</b><span>факты · слои · влияние</span></div>
  <button class="twbtn" id="tw-toggle" title="Tweaks">⚙</button>
</header>
<div id="appwrap">
  <div id="stage">
    <div class="view on" id="view-map">
      <canvas id="glcanvas"></canvas>
      <div class="legend" id="legend"></div>
      <div class="civcap" id="civcap" style="display:none"></div>
      <div class="rightpanel" id="rightpanel">
        <div class="idxsel" id="idxsel"></div>
        <div class="idxlegend" id="idxlegend" style="display:none">
          <div class="idxbar" id="idxbar"></div>
          <div class="idxlabels" id="idxlabels"><span id="idxlow"></span><span id="idxhigh"></span></div>
          <div class="idxswatches" id="idxswatches" style="display:none"></div>
          <div class="idxmeta" id="idxmeta"></div>
          <button id="pyrShowTiers" style="display:none;margin-top:10px;background:#243748;border:1px solid var(--line);color:var(--ink);font-size:11.5px;padding:8px 12px;border-radius:9px;cursor:pointer;width:100%">📋 Показать список ярусов</button>
        </div>
        <div class="infnote" id="infnote" style="display:none">Двигай время — зоны влияния растут и сжимаются</div>
      </div>
      <div class="zoomctl"><button id="zin">+</button><button id="zout">−</button><button id="zreset" style="font-size:13px">⊙</button></div>
    </div>
    <div class="pyrdrawer" id="view-pyr">
      <button id="pyrGoMap" style="margin:0 0 12px;background:#243748;border:1px solid var(--line);color:var(--ink);font-size:12px;padding:8px 13px;border-radius:9px;cursor:pointer">✕ Свернуть, показать глобус</button>
      <div id="pyr"><h3>Как живёт общество крепости — от вершины ко дну. Тапни слой.</h3></div>
</div>
  </div>
  <div class="tweaks" id="tweaks">    <h4>Theme</h4>
    <div class="seg" id="seg-theme"><button class="on" data-v="dark">DARK</button><button data-v="light">LIGHT</button></div>
    <h4>Breakpoint</h4>
    <div class="seg" id="seg-bp"><button class="on" data-v="desktop">DESKTOP</button><button data-v="tablet">TABLET</button><button data-v="mobile">MOBILE</button></div>
    <h4>Network</h4>
    <div class="twrow"><div class="colorpick" id="arccolorpick"><span class="swatch" id="arcswatch" style="background:#36c5c0"></span><span>Arc color</span></div></div>
    <div class="twrow"><div class="lbl"><span>Arc width</span><span id="v-arcwidth">0.6</span></div><input type="range" id="arcwidth" min="0.1" max="2" step="0.05" value="0.6"></div>
    <div class="twrow"><div class="lbl"><span>Arc glow</span><span id="v-arcglow">13</span></div><input type="range" id="arcglow" min="0" max="30" step="1" value="13"></div>
    <div class="twrow"><div class="lbl"><span>Arc density</span><span id="v-arcdensity">100%</span></div><input type="range" id="arcdensity" min="10" max="100" step="5" value="100"></div>
    <div class="twrow"><div class="lbl"><span>City size</span><span id="v-citysize">1.0</span></div><input type="range" id="citysize" min="0.3" max="2.5" step="0.1" value="1.0"></div>
    <div class="twrow"><div class="lbl"><span>Pulse speed</span><span id="v-pulse">3.4s</span></div><input type="range" id="pulse" min="1" max="8" step="0.1" value="3.4"></div>
    <label class="chk"><input type="checkbox" id="chk-arcs" checked>Show arcs</label>
    <label class="chk"><input type="checkbox" id="chk-cities" checked>Show cities</label>
    <label class="chk"><input type="checkbox" id="chk-labels" checked>City labels</label>
    <label class="chk"><input type="checkbox" id="chk-layercolor" checked>Layer colors (off = single arc color)</label>
  </div>
</div>
<div class="timewrap" id="timewrap">
  <div class="eras"><b>до 90-х</b><span>90-е</span><span>00-е</span><span>2026</span><span>+10</span><b>+20→</b></div>
  <input type="range" id="time" min="1970" max="2046" value="2026" step="1">
  <div class="trow"><div class="y" id="ylbl">2026</div><div class="ph" id="phlbl"></div><button class="play" id="play">▶</button></div>
  <div class="certrow"><button id="c-all" class="on">всё</button><button id="c-fact">только факты</button><button id="c-spec">прогнозы</button></div>
</div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <div class="eyebrow" id="s-layer"></div><h2 id="s-title"></h2><div class="when" id="s-when"></div>
  <div class="cert" id="s-cert"></div><div class="body" id="s-body"></div>
  <div><span class="geo" id="s-geo"></span></div><div class="rel" id="s-rel"></div><div class="src" id="s-src"></div>
</div>
<script>
function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}
const LAYERS={resources:{name:"Ресурсы",color:css('--resources')},ecology:{name:"Экология",color:css('--ecology')},consumption:{name:"Потребление",color:css('--consumption')},control:{name:"Контроль · крепость",color:css('--control')},migration:{name:"Миграция",color:css('--migration')},ai:{name:"AI как сила",color:css('--ai')},robots:{name:"Роботы · труд",color:css('--robots')}};
const NODES=[
 {id:"ltg",layer:"resources",title:"Limits to Growth",t:1972,geo:null,cert:"fact",fact:"Доклад Римского клуба (1972). Модель World3. При «как обычно» рост упирается в пределы планеты в XXI веке, дальше — резкий спад.",source:{name:"Club of Rome / Wikipedia",url:"https://en.wikipedia.org/wiki/The_Limits_to_Growth"},links:[{to:"ltg2020",verb:"продолжается в"},{to:"capitalism",verb:"причина"}]},
 {id:"ltg2020",layer:"resources",title:"Пересчёт: пик ≈2040",t:2020,geo:null,cert:"forecast",fact:"Сверки 2004/2020/2021: реальность идёт по «рост любой ценой». Пик и спад ≈2040. Пересчёт 2025 — перелом 2024–2030.",source:{name:"Herrington 2021",url:"https://en.wikipedia.org/wiki/The_Limits_to_Growth"},links:[{to:"collapse",verb:"ведёт к"}]},
 {id:"copper",layer:"resources",title:"Дефицит меди и лития",t:2035,geo:{lng:-67,lat:-23},geoName:"Литиевый треугольник · Анды",cert:"forecast",fact:"IEA: к 2035 дефицит меди ≈30%, лития ≈40%. Спрос на литий ×десятки к 2040. Добыча — Чили/Боливия/Аргентина, не хватает воды.",source:{name:"IEA Critical Minerals 2025",url:"https://www.iea.org/reports/global-critical-minerals-outlook-2025/overview-of-outlook-for-key-minerals"},links:[{to:"water",verb:"усиливает"}]},
 {id:"water",layer:"ecology",title:"Водный дефицит добычи",t:2040,geo:{lng:-115.8,lat:33.3},geoName:"Salton Sea · Калифорния",cert:"forecast",fact:"Воды для лития в разы меньше оценок. 2040–2060: западные бассейны США не покрывают спрос. Острейший случай — Salton Sea.",source:{name:"Live Science 2026",url:"https://www.livescience.com/planet-earth/climate-change/water-shortages-could-prevent-the-us-from-mining-more-lithium-deepening-reliance-on-foreign-imports"},links:[]},
 {id:"monoculture",layer:"ecology",title:"Монокультурная хрупкость",t:1990,geo:{lng:-79,lat:2},geoName:"бананы · тропики",cert:"fact",fact:"Твой пример: бананы и монокультуры — уязвимое звено. Патоген рушит вид-продукт глобально. Симптом урона экологии.",source:{name:"(твой пример)",url:""},links:[{to:"collapse",verb:"вклад в"}]},
 {id:"coral",layer:"ecology",title:"4-я волна обесцвечивания кораллов",t:2023,geo:{lng:147,lat:-18},geoName:"Большой Барьерный риф · тропики",cert:"fact",fact:"2023–2025: тепловой стресс задел 84% площади коралловых рифов планеты в 83+ странах — самое масштабное обесцвечивание в истории наблюдений, обошедшее событие 2014–17 (56%). К середине 2025 волна завершилась, но NOAA: теперь рифы обесцвечиваются почти ежегодно — прежней передышки между событиями не будет.",source:{name:"NOAA Coral Reef Watch",url:"https://www.noaa.gov/news-release/noaa-confirms-4th-global-coral-bleaching-event"},links:[{to:"collapse",verb:"симптом"}]},

/* Толщина/яркость стрелки — производная от РЕАЛЬНОГО числа людей (count), не ручной прикидки:
   лог-шкала, чтобы поток в 74 тыс. и поток в 4.5 млн визуально отличались, но самый маленький не пропадал совсем. */
function migVolFromCount(count){
  const logMin=Math.log10(25000), logMax=Math.log10(5000000);
  const t=Math.max(0,Math.min(1,(Math.log10(Math.max(1,count||1))-logMin)/(logMax-logMin)));
  return 0.32+t*2.5;
}
function fmtCount(n){
  if(n>=1000000)return (n/1000000).toFixed(n%1000000===0?0:1).replace('.0','')+' млн';
  if(n>=1000)return Math.round(n/1000)+' тыс.';

// safe antimeridian handling: instead of "unwrapping" longitudes (which corrupts rings that
// cross ±180 more than once, like Chukotka's jagged coastline), we clip individual bad edges
// right at the canvas seam when actually drawing — see tracePath() below.
function tracePath(ctx,ring,X,Y,W){
  let started=false,prevLng=null,prevY=null;
  for(let i=0;i<ring.length;i++){
    const [lng,lat]=ring[i];
    const y=Y(lat);
    if(prevLng!==null && Math.abs(lng-prevLng)>180){
      const edgeNear=prevLng>0?W:0, edgeFar=prevLng>0?0:W;
      ctx.lineTo(edgeNear,(prevY+y)/2);
      ctx.closePath();
      ctx.moveTo(edgeFar,(prevY+y)/2);
      ctx.lineTo(X(lng),y);
    } else if(!started){
      ctx.moveTo(X(lng),y);started=true;
    } else {
      ctx.lineTo(X(lng),y);
    }
    prevLng=lng;prevY=y;
  }
  ctx.closePath();
}

// base sphere — world map rendered as a canvas texture (2D fill; no 3D triangulation, so no sag/cracks/holes are possible)
function buildWorldTexture(){
  const W=2048,H=1024;
  const cnv=document.createElement('canvas');cnv.width=W;cnv.height=H;
  const ctx=cnv.getContext('2d');
  const X=lng=>(lng+180)/360*W, Y=lat=>(90-lat)/180*H;
  ctx.fillStyle='#0e161f';ctx.fillRect(0,0,W,H);
  // graticule baked into the texture — will naturally hide under land, no depth-testing needed
  ctx.strokeStyle='#1d2c3a';ctx.lineWidth=1.4;
  for(let lng=-180;lng<180;lng+=30){ctx.beginPath();ctx.moveTo(X(lng),Y(-68));ctx.lineTo(X(lng),Y(68));ctx.stroke();}
  for(let lat=-60;lat<=60;lat+=30){ctx.beginPath();ctx.moveTo(X(-180),Y(lat));ctx.lineTo(X(180),Y(lat));ctx.stroke();}
  // land fill (evenodd handles holes like the Caspian correctly regardless of ring winding)
  ctx.fillStyle='#2a3f52';
  LAND_RINGS.forEach(feature=>{
    const path=new Path2D();
    feature.forEach(ring=>{
      if(ring.length<3)return;
      tracePath(path,ring,X,Y,W);
    });
    ctx.fill(path,'evenodd');
  });
  // coastline stroke
  ctx.strokeStyle='#4d6478';ctx.lineWidth=1.2;
  LAND_RINGS.forEach(feature=>{
    const ring=feature[0];if(!ring||ring.length<3)return;
    ctx.beginPath();tracePath(ctx,ring,X,Y,W);ctx.stroke();
  });
  const tex=new THREE.CanvasTexture(cnv);tex.anisotropy=4;
  return tex;
}

// point-in-polygon test (ray casting), used for choropleth click detection since the choropleth is now also a texture, not separate clickable meshes
function pointInRing(lng,lat,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    const intersect=((yi>lat)!==(yj>lat)) && (lng < (xj-xi)*(lat-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

function vectorToLngLat(v){
  const r=v.length();

  let theta=Math.atan2(v.z,-v.x);if(theta<0)theta+=2*Math.PI;
  const lng=theta*180/Math.PI-180;
  return {lat,lng};
}

  let outsideName=null,outBest=0;
  for(const o of PYRAMID_OUTSIDE){
    const dlat=lat-o.lat, dlng=((lng-o.lng+540)%360-180)*cosLat;
    const dn=Math.sqrt(dlat*dlat+dlng*dlng)/o.r;
    const f=Math.max(0,1-dn);
    if(f>outBest){outBest=f;outsideName=o.name;}
  }
  if(outBest>0.5)tier=PYRAMID.length-1; // only label it as the enclave tier once well inside it, matching the visual blend
  const t=PYRAMID[tier];
  document.getElementById('s-layer').textContent='Слои пирамиды · ярус';document.getElementById('s-layer').style.color=t.color;
  document.getElementById('s-title').textContent=t.name;

  document.getElementById('s-body').textContent=t.life+(outBest>0.5?` Эта конкретная точка — анклав «${outsideName}», один из немногих регионов вне глобальной экономики.`:` В этой конкретной точке — ближайший центр притяжения: ${bestName}, на расстоянии ~${Math.round(best)} усл. ед.`);
  document.getElementById('s-geo').textContent='📍 '+lat.toFixed(1)+'°, '+lng.toFixed(1)+'°';
  document.getElementById('s-rel').innerHTML='';document.getElementById('s-src').innerHTML='';

}

const nodeGroup=new THREE.Group();globeGroup.add(nodeGroup);

function labelSprite(text,color){

  const tex=new THREE.CanvasTexture(cnv);tex.minFilter=THREE.LinearFilter;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,depthWrite:false});
  const sp=new THREE.Sprite(mat);sp.scale.set(w*0.09,h*0.09,1);

function buildNodes(){

    const pos=ll2v(n.geo.lat,n.geo.lng,R*1.012);

const raycaster=new THREE.Raycaster();const mouseNDC=new THREE.Vector2();
function pickNode(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  mouseNDC.x=((clientX-rect.left)/rect.width)*2-1;
  mouseNDC.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouseNDC,camera);
  // Three.js raycasting ignores object.visible — must filter manually, otherwise nodes hidden by
  // the time slider / layer toggle / cert filter still "steal" clicks and hover meant for what's
  // actually on screen (this is what made flow-arrow clicks and hover feel random/broken).
  const dots=Object.values(nodeObjs).filter(o=>o.dot.visible).map(o=>o.dot);

// arcs
const arcGroup=new THREE.Group();globeGroup.add(arcGroup);
let arcDefs=[]; // {fromId,toId,layer,cert,curve,rand}
(function(){
  const baseR=R*1.012;
  NODES.forEach(n=>{(n.links||[]).forEach(lk=>{
    const t=idMap[lk.to];if(!t)return;
    const a=ll2v(n.geo.lat,n.geo.lng,baseR),b=ll2v(t.geo.lat,t.geo.lng,baseR);
    const dist=a.distanceTo(b);
    const mid=a.clone().add(b).multiplyScalar(0.5);
    const alt=Math.max(R*0.12, dist*0.18); // firm floor prevents the bezier dipping near endpoints on short arcs
    mid.setLength(baseR+alt);
    const curve=new THREE.QuadraticBezierCurve3(a,mid,b);
    arcDefs.push({fromId:n.id,toId:lk.to,layer:n.layer,cert:t.cert==='fantasy'||n.cert==='fantasy'?'fantasy':(t.cert==='forecast'||n.cert==='forecast'?'forecast':'fact'),fromT:n.t,toT:t.t,curve,rand:Math.random(),synthCount:(n._synthetic?1:0)+(t._synthetic?1:0)});
  })
  })
})();
let arcMeshes=[]; // {group,curve,def,particle,phase}
function clearArcMeshes(){arcMeshes.forEach(a=>arcGroup.remove(a.group));arcMeshes=[]}
function rebuildArcMeshes(){
  clearArcMeshes();
  const widthVal=+arcwidthEl.value, glowVal=+arcglowEl.value/30;
  const useLayerColor=chkLayerColor.checked;
  const overrideColor=new THREE.Color(arcOverrideColor);
  arcDefs.forEach((def,i)=>{
    if(def.synthCount>=2) return; // pure concept-to-concept: no geography to show, skip entirely (still visible in the sheet's "связи" list)
    const color=useLayerColor?new THREE.Color(LAYERS[def.layer].color):overrideColor;
    const pts=def.curve.getPoints(48);
    const path=new THREE.CatmullRomCurve3(pts);
    const isConceptPointer=def.synthCount===1;
    const coreR=(isConceptPointer?0.32:0.55)*widthVal;
    const glowR=coreR*(isConceptPointer?1.2:1.8+glowVal*3.5);
    const coreOpacity=isConceptPointer?0.4:0.85;
    const dashSize=isConceptPointer?4:0;
    const coreMat=dashSize?new THREE.LineDashedMaterial({color,transparent:true,opacity:coreOpacity,dashSize:4,gapSize:3}):new THREE.MeshBasicMaterial({color,transparent:true,opacity:coreOpacity});
    let core;
    if(isConceptPointer){
      core=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),coreMat);
      core.computeLineDistances();
    } else {
      core=new THREE.Mesh(new THREE.TubeGeometry(path,48,coreR,6,false),coreMat);
    }
    const g=new THREE.Group();g.add(core);
    if(!isConceptPointer){
      const glow=new THREE.Mesh(new THREE.TubeGeometry(path,48,glowR,6,false),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.12+glowVal*.18,blending:THREE.AdditiveBlending,depthWrite:false}));
      g.add(glow);
      const particle=new THREE.Mesh(new THREE.SphereGeometry(coreR*2.2,8,8),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false}));
      g.add(particle);
      arcMeshes.push({group:g,curve:path,def,particle,phase:def.rand});
    } else {
      arcMeshes.push({group:g,curve:path,def,particle:null,phase:def.rand});
    }
    arcGroup.add(g);
  });
  applyFilters();
}

function animate(){
  requestAnimationFrame(animate);

  const t=(performance.now()-clockStart)/1000;
  const pulseDur=+pulseEl.value;
  const showArcs=chkArcs.checked;
  arcMeshes.forEach(a=>{
    if(!a.particle)return;
    const visible=showArcs && a.group.visible;
    a.particle.visible=visible;
    if(visible){
      const ph=((t/pulseDur)+a.phase)%1;
      const p=a.curve.getPointAt(ph);
      a.particle.position.copy(p);
    }
  });
  if(energyGroup.visible){
    energyMeshes.forEach(m=>{
      const ph=((t/2.6)+m.phase)%1;
      m.particle.position.copy(m.curve.getPointAt(ph));
    });
  }
  if(migrationGroup.visible){
    migrationMeshes.forEach(m=>{
      if(!m.group.visible)return;
      const ph=((t/2.6)+m.phase)%1;
      m.particle.position.copy(m.curve.getPointAt(ph));
    });
  }
  renderer.render(scene,camera);
}

  methodology:'Граф конкретных фактов и прогнозов (не абстракция и не индекс страны): каждый узел — реальное событие, отчёт, закон или тренд с датой и источником, привязанный к точке на глобусе (или помеченный «◇ вне географии», если это абстрактная сила — капитализм, миграция, VPN). Цвет узла = тематический слой (легенда слева: ресурсы/экология/потребление/контроль/миграция/AI/роботы). Дуги между узлами — причинно-следственная или тематическая связь («усиливает», «толкает к»), а не географическая близость. Обводка узла = достоверность: факт / прогноз / фантазия — управляется фильтром внизу. Слайдер времени раскрывает узлы по мере наступления их даты. Клик по узлу — карточка с источником.'};
const MODES=[MAP_MODE_DEF,...INDEX_DEFS];
const idxsel=document.getElementById('idxsel'),idxlegend=document.getElementById('idxlegend'),idxlow=document.getElementById('idxlow'),idxhigh=document.getElementById('idxhigh'),idxmeta=document.getElementById('idxmeta');
MODES.forEach(def=>{
  const b=document.createElement('button');
  b.textContent=def.name+(def.ready?'':' · скоро');
  b.dataset.id=def.id;
  if(!def.ready)b.classList.add('soon');
  b.addEventListener('click',()=>{if(def.ready)selectMode(def.id)});
  idxsel.appendChild(b);
});
function selectMode(id){
  currentIndexId=id;
  idxsel.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
  const def=MODES.find(d=>d.id===id);
  const idxbarEl=document.getElementById('idxbar'),idxlabelsEl=document.getElementById('idxlabels'),idxswatchesEl=document.getElementById('idxswatches'),pyrShowTiersEl=document.getElementById('pyrShowTiers');
  pyrShowTiersEl.style.display=(id==='pyramid')?'block':'none';
  if(id!=='pyramid')vPyr.classList.remove('open');
  if(id==='map'){
    mode='map';
    civGlowGroup.visible=false;borderGroup.visible=false;indexGroup.visible=false;
    nodeGroup.visible=true;arcGroup.visible=true;
    legendEl.style.display='';civcapEl.style.display='none';infnote.style.display='none';timewrap.style.display='';
    idxlegend.style.display='none'; // no permanent "what is this mode" blurb — was cluttering the view
    applyFilters(); // also drives energyGroup/refBorderGroup/migrationGroup visibility based on which of the 7 layers is toggled on
  } else if(id==='influence'){
    mode='influence';
    nodeGroup.visible=false;arcGroup.visible=false;legendEl.style.display='none';
    civGlowGroup.visible=true;borderGroup.visible=true;indexGroup.visible=false;energyGroup.visible=false;refBorderGroup.visible=false;
    civcapEl.style.display='';infnote.style.display='';idxlegend.style.display='none';timewrap.style.display='';
    updateCivGlow();updateBorders();
  } else if(id==='energy'){
    mode='influence';
    nodeGroup.visible=false;arcGroup.visible=false;legendEl.style.display='none';
    civGlowGroup.visible=false;borderGroup.visible=false;indexGroup.visible=false;energyGroup.visible=true;refBorderGroup.visible=true;
    civcapEl.style.display='none';infnote.style.display='none';timewrap.style.display='';
    idxlegend.style.display='block';idxmeta.textContent=def.methodology;
    idxbarEl.style.display='none';idxlabelsEl.style.display='none';idxswatchesEl.style.display='flex';
    const cats=[['#a67ce0','сырьё / минералы'],['#e0a93b','нефть / газ / энергия'],['#4cae6b','продовольствие'],['#36c5c0','данные / облако'],['#e35d7b','человеческий капитал / деньги']];
    idxswatchesEl.innerHTML=cats.map(c=>`<div class="sw-row"><span class="sw-dot" style="background:${c[0]}"></span>${c[1]}</div>`).join('');
    applyEnergyTimeFilter();
  } else {
    mode='influence';
    nodeGroup.visible=false;arcGroup.visible=false;legendEl.style.display='none';
    civGlowGroup.visible=false;borderGroup.visible=false;indexGroup.visible=true;energyGroup.visible=false;refBorderGroup.visible=false;
    civcapEl.style.display='none';infnote.style.display='none';timewrap.style.display='';
    applyIndexColors(id);
    idxlegend.style.display='block';idxlow.textContent=def.lowLabel;idxhigh.textContent=def.highLabel;idxmeta.textContent=def.methodology;
    idxbarEl.style.display='block';idxlabelsEl.style.display='flex';idxswatchesEl.style.display='none';
    if(def.kind==='gradient'){
      idxbarEl.style.background=`linear-gradient(90deg,${PYRAMID[PYRAMID.length-1].color},${PYRAMID[0].color})`;
    } else {
      idxbarEl.style.background='linear-gradient(90deg,#1f3a42,#4dd8d0)';
    }
  }
}
let indexTimePending=false;
timeEl.addEventListener('input',()=>{
  const def=INDEX_DEFS.find(d=>d.id===currentIndexId);
  if(mode==='influence' && def && def.kind==='gradient' && !indexTimePending){
    indexTimePending=true;
    requestAnimationFrame(()=>{applyIndexColors(currentIndexId);indexTimePending=false;});
  }
  if(mode==='influence' && currentIndexId==='energy'){applyEnergyTimeFilter();}
});
document.getElementById('pyrGoMap').addEventListener('click',()=>{vPyr.classList.remove('open');});
document.getElementById('pyrShowTiers').addEventListener('click',()=>{vPyr.classList.add('open');});

/* pyramid */
const pyr=document.getElementById('pyr');
PYRAMID.forEach((tier,i)=>{const w=42+i*(58/(PYRAMID.length-1));const el=document.createElement('div');el.className='tier';el.style.width=w+'%';el.style.maxWidth='560px';el.innerHTML=`<div class="bar" style="background:${tier.color}"></div><div class="tpct">${tier.pct}</div><div class="tname">${tier.name}</div><div class="tlife">${tier.life}</div>`;pyr.appendChild(el)});

/* sheet */
const sheet=document.getElementById('sheet'),scrim=document.getElementById('scrim');
function openSheet(id){
  const n=idMap[id];const sl=document.getElementById('s-layer');sl.textContent=LAYERS[n.layer].name;sl.style.color=LAYERS[n.layer].color;
  document.getElementById('s-title').textContent=n.title;
  document.getElementById('s-when').textContent='появляется: '+(n.t>2026?'+'+(n.t-2026)+' лет · '+n.t:n.t);
  const c=document.getElementById('s-cert');const cm={fact:['факт · на данных','fact'],forecast:['прогноз · из темпов','forecast'],fantasy:['фантазия · дальний горизонт','fantasy']};
  c.textContent=cm[n.cert][0];c.className='cert '+cm[n.cert][1];
  document.getElementById('s-body').textContent=n.fact;
  const geo=document.getElementById('s-geo');geo.textContent=(!n._synthetic)?('📍 '+(n.geoName||'на карте')):'🌐 глобально';
  const rel=document.getElementById('s-rel');
  const outs=(n.links||[]).map(l=>({...l,dir:'→'}));
  const ins=NODES.filter(m=>(m.links||[]).some(l=>l.to===id)).map(m=>({to:m.id,verb:(m.links.find(l=>l.to===id)||{}).verb,dir:'←'}));
  const all=[...outs,...ins];
  rel.innerHTML=all.length?'<h4>связи</h4>'+all.map(l=>{const t=idMap[l.to];if(!t)return'';return `<a data-go="${l.to}"><span class="d" style="background:${LAYERS[t.layer].color}"></span>${l.dir} ${t.title}<span class="verb">${l.verb||''}</span></a>`}).join(''):'';
  rel.querySelectorAll('a').forEach(a=>a.onclick=()=>openSheet(a.dataset.go));
  const src=document.getElementById('s-src');src.innerHTML=n.source&&n.source.name?('источник: '+(n.source.url?`<a href="${n.source.url}" target="_blank" rel="noopener">${n.source.name}</a>`:n.source.name)):'';
  sheet.classList.add('open');scrim.classList.add('on');
}
function closeSheet(){sheet.classList.remove('open');scrim.classList.remove('on')}
scrim.onclick=closeSheet;

/* ================= TWEAKS PANEL ================= */
const twToggle=document.getElementById('tw-toggle'),tweaks=document.getElementById('tweaks');
twToggle.onclick=()=>{tweaks.classList.toggle('open');twToggle.classList.toggle('on')};
const segTheme=document.getElementById('seg-theme');
segTheme.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{segTheme.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.body.classList.toggle('light',b.dataset.v==='light');Object.values(nodeObjs).forEach(o=>{o.label.material.map.dispose();});rebuildLabelsColor();}));
function rebuildLabelsColor(){
  const col=inkColor();
  NODES.forEach(n=>{const o=nodeObjs[n.id];const cnv=document.createElement('canvas');const ctx=cnv.getContext('2d');const fs=40;ctx.font=`600 ${fs}px Inter, sans-serif`;const w=Math.ceil(ctx.measureText(n.title).width)+24,h=fs+20;cnv.width=w;cnv.height=h;ctx.font=`600 ${fs}px Inter, sans-serif`;ctx.fillStyle=col;ctx.textBaseline='middle';ctx.fillText(n.title,12,h/2);const tex=new THREE.CanvasTexture(cnv);tex.minFilter=THREE.LinearFilter;o.label.material.map=tex;o.label.material.needsUpdate=true;});
}
const segBp=document.getElementById('seg-bp'),appwrap=document.getElementById('appwrap');
segBp.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{segBp.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');appwrap.className='';if(b.dataset.v==='tablet')appwrap.classList.add('bp-tablet');if(b.dataset.v==='mobile')appwrap.classList.add('bp-mobile');setTimeout(onResize,260)}));
let arcOverrideColor='#36c5c0';
const arccolorpick=document.getElementById('arccolorpick'),arcswatch=document.getElementById('arcswatch');
arccolorpick.addEventListener('click',()=>{
  const inp=document.createElement('input');inp.type='color';inp.value=arcOverrideColor;
  inp.addEventListener('input',()=>{arcOverrideColor=inp.value;arcswatch.style.background=inp.value;rebuildArcMeshes()});
  inp.click();
});
const arcwidthEl=document.getElementById('arcwidth'),vArcwidth=document.getElementById('v-arcwidth');
arcwidthEl.addEventListener('input',()=>{vArcwidth.textContent=(+arcwidthEl.value).toFixed(2);rebuildArcMeshes()});
const arcglowEl=document.getElementById('arcglow'),vArcglow=document.getElementById('v-arcglow');
arcglowEl.addEventListener('input',()=>{vArcglow.textContent=arcglowEl.value;rebuildArcMeshes()});
const arcdensityEl=document.getElementById('arcdensity'),vArcdensity=document.getElementById('v-arcdensity');
arcdensityEl.addEventListener('input',()=>{vArcdensity.textContent=arcdensityEl.value+'%';applyFilters()});
const citysizeEl=document.getElementById('citysize'),vCitysize=document.getElementById('v-citysize');
citysizeEl.addEventListener('input',()=>{vCitysize.textContent=(+citysizeEl.value).toFixed(1);applyFilters()});
const pulseEl=document.getElementById('pulse'),vPulse=document.getElementById('v-pulse');
pulseEl.addEventListener('input',()=>{vPulse.textContent=(+pulseEl.value).toFixed(1)+'s'});
const chkArcs=document.getElementById('chk-arcs'),chkCities=document.getElementById('chk-cities'),chkLabels=document.getElementById('chk-labels'),chkLayerColor=document.getElementById('chk-layercolor');
[chkArcs,chkCities,chkLabels].forEach(c=>c.addEventListener('change',applyFilters));
chkLayerColor.addEventListener('change',rebuildArcMeshes);

/* ---------- init ---------- */
rebuildArcMeshes();
selectMode('map');
animate();

// --- time-driven recolor for choropleth (AI) ---
if(typeof timeEl!=='undefined'){
  timeEl.addEventListener('input',()=>{
    if(typeof currentIndexId!=='undefined'){
      const def=INDEX_DEFS.find(d=>d.id===currentIndexId);
      if(def && def.kind==='choropleth' && typeof applyIndexColors==='function'){
        applyIndexColors(currentIndexId);
        if(typeof indexTex!=='undefined' && indexTex) indexTex.needsUpdate=true;
      }
    }
  });
}
</script>
</body>
</html>
